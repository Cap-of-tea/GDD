name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore src/BrowserXn/BrowserXn.csproj
      - run: dotnet build src/BrowserXn/BrowserXn.csproj -c Release --no-restore
      - run: dotnet publish src/BrowserXn/BrowserXn.csproj -c Release -p:PublishSingleFile=true -o publish/win-gui
      - uses: actions/upload-artifact@v4
        with:
          name: GDD-Desktop-Windows
          path: publish/win-gui/

      - name: Create update artifact (without browsers)
        shell: pwsh
        run: |
          Copy-Item -Recurse publish/win-gui publish/win-gui-update
          Remove-Item -Recurse -Force publish/win-gui-update/logs -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: GDD-Desktop-Windows-Update
          path: publish/win-gui-update/

  build-headless:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: GDD-Server-Windows
          - os: ubuntu-22.04
            rid: linux-x64
            artifact: GDD-Server-Linux
          - os: macos-14
            rid: osx-arm64
            artifact: GDD-Server-macOS-ARM
          - os: macos-14
            rid: osx-x64
            artifact: GDD-Server-macOS-Intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore src/GDD.Headless/GDD.Headless.csproj
      - run: dotnet build src/GDD.Headless/GDD.Headless.csproj -c Release --no-restore
      - name: Publish
        run: >
          dotnet publish src/GDD.Headless/GDD.Headless.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o publish/${{ matrix.rid }}

      - name: Install Playwright browsers
        if: matrix.rid != 'osx-x64' || runner.arch != 'ARM64'
        run: pwsh publish/${{ matrix.rid }}/playwright.ps1 install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/publish/${{ matrix.rid }}/.browsers

      - name: Install Playwright browsers (cross-compile)
        if: matrix.rid == 'osx-x64' && runner.arch == 'ARM64'
        shell: bash
        run: |
          BROWSERS_DIR="${{ github.workspace }}/publish/osx-x64/.browsers"
          BROWSERS_JSON="${{ github.workspace }}/publish/osx-x64/.playwright/package/browsers.json"
          CR=$(python3 -c "import json; d=json.load(open('$BROWSERS_JSON')); print(next(b['revision'] for b in d['browsers'] if b['name']=='chromium'))")
          FR=$(python3 -c "import json; d=json.load(open('$BROWSERS_JSON')); print(next(b['revision'] for b in d['browsers'] if b['name']=='ffmpeg'))")
          echo "Chromium revision: $CR, FFMPEG revision: $FR"
          mkdir -p "$BROWSERS_DIR/chromium-$CR" "$BROWSERS_DIR/ffmpeg-$FR"
          curl -sL "https://playwright.azureedge.net/builds/chromium/$CR/chromium-mac.zip" -o /tmp/chromium.zip
          unzip -q /tmp/chromium.zip -d "$BROWSERS_DIR/chromium-$CR"
          curl -sL "https://playwright.azureedge.net/builds/ffmpeg/$FR/ffmpeg-mac.zip" -o /tmp/ffmpeg.zip
          unzip -q /tmp/ffmpeg.zip -d "$BROWSERS_DIR/ffmpeg-$FR"
          echo "Chromium x64 installed to $BROWSERS_DIR"

      - name: Smoke test
        if: matrix.rid != 'osx-x64' || runner.arch != 'ARM64'
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            ./GDD.Headless.exe &
          else
            chmod +x GDD.Headless
            chmod +x Scripts/mcp-proxy.sh
            ./GDD.Headless &
          fi
          PID=$!
          sleep 8
          RESPONSE=$(curl -sf -X POST http://localhost:9700/mcp \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}')
          TOOLS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())['result']['tools']))")
          echo "Tools found: $TOOLS"
          kill $PID 2>/dev/null || true
          if [ "$TOOLS" -ne 37 ]; then
            echo "Expected 37 tools, got $TOOLS"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}/
          include-hidden-files: true

      - name: Remove full Chromium.app from macOS artifacts (keep only headless shell)
        if: startsWith(matrix.rid, 'osx-')
        shell: bash
        run: |
          find publish/${{ matrix.rid }}/.browsers -maxdepth 1 -name 'chromium-*' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Create update artifact (without browsers)
        shell: bash
        run: |
          cp -r publish/${{ matrix.rid }} publish/${{ matrix.rid }}-update
          rm -rf publish/${{ matrix.rid }}-update/.browsers
          rm -rf publish/${{ matrix.rid }}-update/.playwright
          rm -rf publish/${{ matrix.rid }}-update/logs
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-update
          path: publish/${{ matrix.rid }}-update/

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            rid: linux-x64
            artifact: GDD-Desktop-Linux
            node: linux-x64
          - os: macos-14
            rid: osx-arm64
            artifact: GDD-Desktop-macOS-ARM
            node: darwin-arm64
          - os: macos-14
            rid: osx-x64
            artifact: GDD-Desktop-macOS-Intel
            node: darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore src/GDD.Desktop/GDD.Desktop.csproj
      - name: Publish
        run: >
          dotnet publish src/GDD.Desktop/GDD.Desktop.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -o publish/${{ matrix.rid }}

      - name: Verify Playwright node driver present (P0 packaging guard)
        shell: bash
        run: |
          NODE="publish/${{ matrix.rid }}/.playwright/node/${{ matrix.node }}/node"
          if [ ! -s "$NODE" ]; then
            echo "::error::Playwright node driver missing at $NODE (cross-compile would ship an empty driver)"
            ls -laR "publish/${{ matrix.rid }}/.playwright/node" || true
            exit 1
          fi
          echo "node driver OK: $(ls -l "$NODE")"

      - name: Install Playwright browsers
        if: matrix.rid != 'osx-x64' || runner.arch != 'ARM64'
        run: pwsh publish/${{ matrix.rid }}/playwright.ps1 install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/publish/${{ matrix.rid }}/.browsers

      - name: Install Playwright browsers (osx-x64 cross from ARM)
        if: matrix.rid == 'osx-x64' && runner.arch == 'ARM64'
        shell: bash
        run: |
          BROWSERS_DIR="${{ github.workspace }}/publish/osx-x64/.browsers"
          BROWSERS_JSON="${{ github.workspace }}/publish/osx-x64/.playwright/package/browsers.json"
          CR=$(python3 -c "import json; d=json.load(open('$BROWSERS_JSON')); print(next(b['revision'] for b in d['browsers'] if b['name']=='chromium'))")
          FR=$(python3 -c "import json; d=json.load(open('$BROWSERS_JSON')); print(next(b['revision'] for b in d['browsers'] if b['name']=='ffmpeg'))")
          echo "Chromium revision: $CR, FFMPEG revision: $FR"
          mkdir -p "$BROWSERS_DIR/chromium-$CR" "$BROWSERS_DIR/ffmpeg-$FR"
          curl -sL "https://playwright.azureedge.net/builds/chromium/$CR/chromium-mac.zip" -o /tmp/chromium.zip
          unzip -q /tmp/chromium.zip -d "$BROWSERS_DIR/chromium-$CR"
          curl -sL "https://playwright.azureedge.net/builds/ffmpeg/$FR/ffmpeg-mac.zip" -o /tmp/ffmpeg.zip
          unzip -q /tmp/ffmpeg.zip -d "$BROWSERS_DIR/ffmpeg-$FR"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}/
          include-hidden-files: true

      - name: Create update artifact (without browsers)
        shell: bash
        run: |
          cp -r publish/${{ matrix.rid }} publish/${{ matrix.rid }}-update
          rm -rf publish/${{ matrix.rid }}-update/.browsers
          rm -rf publish/${{ matrix.rid }}-update/.playwright
          rm -rf publish/${{ matrix.rid }}-update/logs
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-update
          path: publish/${{ matrix.rid }}-update/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows-gui, build-headless, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            mcpb
            Design

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package archives
        run: |
          cd artifacts
          for dir in GDD-*; do
            [ -d "$dir" ] || continue
            case "$dir" in
              *Windows*)
                (cd "$dir" && zip -qr "../${dir}.zip" .)
                ;;
              *)
                # upload-artifact strips Unix exec bits — restore them so the released
                # tarball runs out of the box (the app binary, the Playwright node driver
                # and the shell scripts must be executable). P0 packaging fix.
                chmod +x "$dir"/GDD.Desktop "$dir"/GDD.Headless 2>/dev/null || true
                find "$dir/.playwright/node" -name node -exec chmod +x {} + 2>/dev/null || true
                chmod +x "$dir"/Scripts/*.sh "$dir"/*.sh 2>/dev/null || true
                tar -czf "${dir}.tar.gz" -C "$dir" .
                ;;
            esac
          done

      - name: Package MCPB desktop extensions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x mcpb/build-mcpb.sh
          mcpb/build-mcpb.sh "$VERSION" artifacts Design/gdd-logo-400.png artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.mcpb
          generate_release_notes: true
